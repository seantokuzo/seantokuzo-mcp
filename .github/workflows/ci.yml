name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  # ==========================================================================
  # Tests — uncomment once vitest is set up
  # ==========================================================================
  # test:
  #   name: Test
  #   runs-on: ubuntu-latest
  #   needs: [lint, typecheck]
  #   steps:
  #     - uses: actions/checkout@v4
  #
  #     - name: Setup Node
  #       uses: actions/setup-node@v4
  #       with:
  #         node-version: 22
  #         cache: "npm"
  #
  #     - name: Install dependencies
  #       run: npm ci
  #
  #     - name: Run Tests
  #       run: npm test
  #       env:
  #         NODE_ENV: test

  # ==========================================================================
  # Auto-Label PRs on CI Results
  # ==========================================================================
  label-pr:
    name: Label PR
    runs-on: ubuntu-latest
    needs: [lint, typecheck, build]
    if: always() && github.event_name == 'pull_request'
    steps:
      - name: Add CI Pass label
        if: |
          needs.lint.result == 'success' &&
          needs.typecheck.result == 'success' &&
          needs.build.result == 'success'
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            try { await github.rest.issues.removeLabel({ owner, repo, issue_number, name: 'CI Failure' }); } catch {}
            await github.rest.issues.addLabels({ owner, repo, issue_number, labels: ['CI Pass'] });

      - name: Add CI Failure label
        if: |
          needs.lint.result == 'failure' ||
          needs.typecheck.result == 'failure' ||
          needs.build.result == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            try { await github.rest.issues.removeLabel({ owner, repo, issue_number, name: 'CI Pass' }); } catch {}
            await github.rest.issues.addLabels({ owner, repo, issue_number, labels: ['CI Failure'] });

  # ==========================================================================
  # Required Status Check (summary job for branch protection)
  # ==========================================================================
  ci-success:
    name: CI Success
    runs-on: ubuntu-latest
    needs: [lint, typecheck, build]
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          if [[ "${{ needs.lint.result }}" != "success" ]] || \
             [[ "${{ needs.typecheck.result }}" != "success" ]] || \
             [[ "${{ needs.build.result }}" != "success" ]]; then
            echo "One or more jobs failed"
            exit 1
          fi
          echo "All CI checks passed!"
