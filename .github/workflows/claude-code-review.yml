name: Claude Auto Review

# Tier 2: multi-specialist auto-review on PR open / draft -> ready.
# Three concurrent specialists (Security / Architecture / Correctness) each
# Opus 4.7 + --effort xhigh, then a synthesizer job (also Opus 4.7) reads
# their JSON sentinels, posts a verdict sticky, and auto-applies the
# `claude-deep-review` label when escalation criteria are met.
#
# Round 1 fires automatically on PR open / ready_for_review. Subsequent
# rounds are MANUAL via workflow_dispatch — Claude Code (the assistant)
# judges whether the fix-push warrants another review (e.g. behavioural
# changes, new code paths) instead of auto-spawning style-nit loops on
# every push. Dispatch can request all specialists or just one (security /
# architecture / correctness), useful for re-checking a single lane after
# targeted fixes. Single-specialist runs skip the verdict synthesizer
# (it needs all 3 sentinels to compute the aggregate verdict).
#
# Tools: READ-ONLY. Write tools (Edit/Write/NotebookEdit) disallowed.
# The verdict job is the only one allowed to apply the deep-review label.
#
# UPSTREAM: this workflow was forked from the get-sean-done template.
# Re-sync from `../get-sean-done/.github/workflows/claude-code-review.yml`
# and re-fill the project-specific lane rules / sensitive paths / skepticism
# rules below if the template gets meaningful updates.

on:
  pull_request:
    # Only auto-fire round 1 (PR open / draft -> ready). Subsequent rounds
    # are MANUAL via workflow_dispatch — Claude Code judges whether the
    # fix-push warrants another review (e.g. behavioural changes, new code
    # paths) instead of auto-spawning style-nit loops on every push.
    types: [opened, ready_for_review]
  workflow_dispatch:
    inputs:
      pr_number:
        description: PR number to review
        required: true
        type: number
      specialist:
        description: Which specialist(s) to run (default = all 3 + verdict)
        required: false
        type: choice
        default: all
        options:
          - all
          - security
          - architecture
          - correctness

permissions: {}

concurrency:
  group: claude-auto-review-${{ github.event.pull_request.number || inputs.pr_number || github.ref }}
  cancel-in-progress: true

jobs:
  preflight:
    name: Preflight (skip drafts/forks)
    runs-on: ubuntu-latest
    if: |
      github.repository == 'seantokuzo/seantokuzo-mcp' &&
      (github.event_name == 'workflow_dispatch' ||
       (github.event.pull_request.draft != true &&
        github.event.pull_request.head.ref != 'changeset-release/main'))
    outputs:
      pr_number: ${{ steps.set.outputs.pr_number }}
      head_sha: ${{ steps.set.outputs.head_sha }}
    steps:
      - id: set
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "pr_number=${{ inputs.pr_number }}" >> "$GITHUB_OUTPUT"
            echo "head_sha=" >> "$GITHUB_OUTPUT"
          else
            echo "pr_number=${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
            echo "head_sha=${{ github.event.pull_request.head.sha }}" >> "$GITHUB_OUTPUT"
          fi

  security-review:
    needs: preflight
    name: 🔒 Security specialist
    if: |
      github.event_name != 'workflow_dispatch' ||
      inputs.specialist == 'all' ||
      inputs.specialist == 'security'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          additional_permissions: |
            actions: read
          prompt: |
            You are the SECURITY SPECIALIST for the Kuzo MCP auto-review pipeline.

            PR: #${{ needs.preflight.outputs.pr_number }} in ${{ github.repository }}

            FIRST: read CLAUDE.md (especially any "Reviewing with @claude" section),
            docs/STATE.md and docs/PLANNING.md if present, plus any project-specific
            security doc (e.g. docs/SECURITY.md) when release / install / auth /
            workflow files are touched.

            YOUR LANE (only flag these — generic defaults; project-specific rules
            below override / extend):
            - Secret leakage: env vars, logs, error messages, fixtures, snapshot
              files, .env handling, token storage paths, accidental commit of keys
            - Auth / token handling: scope minimization, refresh flow, storage at
              rest, accidental network exfiltration, missing CSRF / origin checks
            - Input validation at trust boundaries: every untrusted field reaching
              an external system / a child process / a database is validated
            - Injection surfaces: command injection (child_process, exec, spawn),
              SQL injection, path traversal, unsafe deserialization, template
              injection
            - Prompt injection: user input flowing into LLM prompts, tool
              descriptions, tool inputs/outputs that another agent might re-execute
            - GitHub Actions safety: pull_request_target misuse, fork-trigger
              guards, `permissions:` write surface justification, third-party
              action SHA pinning, workflow_dispatch input validation
            - Supply chain: dependency add/upgrade scrutiny, lockfile drift,
              postinstall hooks, package-publish surface, OIDC / Trusted
              Publishing config

            Project-specific lane rules:
            - Supply chain: npm publish surface, OIDC / Trusted Publishing config drift,
              Sigstore / provenance attestation correctness on @kuzo-mcp/* packages
            - Prompt injection: especially user input flowing into github / jira /
              git-context plugin tool outputs that another agent might re-execute
            - Install CLI safety: path traversal, command injection, signature
              verification, tarball extraction safety, post-install hooks
            - PAT scope minimization for first-party plugin clients

            NOT YOUR LANE (let other specialists handle):
            - Component boundaries / contracts / file organization -> Architecture
            - Type errors / async hygiene / null-handling -> Correctness
            - Naming / formatting -> ignore (formatter handles it)

            SKEPTICISM RULES:
            - Do NOT flag defensive code for cases the type system / framework
              rules out
            - Do NOT re-litigate decisions already locked in CLAUDE.md / PLANNING.md
            - Do NOT suggest "add tests" unless a test framework is wired
            - Do NOT suggest scope creep beyond the PR's stated goal
            - Do NOT suggest "add tests" — vitest is not wired in CI yet

            STEPS:
            1. `gh pr diff ${{ needs.preflight.outputs.pr_number }}` (read full diff)
            2. `gh pr view ${{ needs.preflight.outputs.pr_number }} --json title,body,additions,deletions,files`
            3. For each finding, post inline via mcp__github_inline_comment__create_inline_comment
            4. Post ONE top-level summary via `gh pr comment` with this exact structure:

            <!-- KUZO-REVIEW-JSON-SECURITY
            {"verdict":"ship|fix-then-ship|rethink","blocking_count":N,"advisory_count":N,"sensitive_paths_touched":true|false,"top_issues":[{"file":"path","line":N,"severity":"blocking|advisory","summary":"..."}],"rationale":"..."}
            -->

            ## 🔒 Security Review

            **Verdict**: <verdict>
            **Blocking**: <N> | **Advisory**: <M>

            <human-readable findings, grouped by severity, with file:line refs>

            ---

            sensitive_paths_touched should be `true` if the diff includes any of:
            - packages/core/src/loader/
            - packages/core/src/install/
            - packages/cli/src/install*
            - docs/SECURITY.md
            - .github/workflows/release.yml
            - .changeset/*.md
            - packages/*/package.json (publishConfig changes)
          claude_args: |
            --model claude-opus-4-7
            --effort xhigh
            --max-turns 18
            --disallowedTools "Edit,Write,NotebookEdit"
            --allowedTools "Read,Glob,Grep,mcp__github_inline_comment__create_inline_comment,mcp__github_ci__get_ci_status,mcp__github_ci__get_workflow_run_details,mcp__github_ci__download_job_log,Bash(gh pr view:*),Bash(gh pr diff:*),Bash(gh pr comment:*),Bash(gh pr checks:*),Bash(gh api repos/seantokuzo/seantokuzo-mcp/pulls/*),Bash(gh api repos/seantokuzo/seantokuzo-mcp/contents/*),Bash(gh api repos/seantokuzo/seantokuzo-mcp/commits/*),Bash(gh run list:*),Bash(gh run view:*),Bash(pnpm typecheck),Bash(pnpm lint),Bash(pnpm build),Bash(pnpm test),Bash(pnpm prettier --check:*),Bash(git diff:*),Bash(git log:*),Bash(git show:*),Bash(git blame:*)"

  architecture-review:
    needs: preflight
    name: 🏗️ Architecture specialist
    if: |
      github.event_name != 'workflow_dispatch' ||
      inputs.specialist == 'all' ||
      inputs.specialist == 'architecture'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          additional_permissions: |
            actions: read
          prompt: |
            You are the ARCHITECTURE SPECIALIST for the Kuzo MCP auto-review pipeline.

            PR: #${{ needs.preflight.outputs.pr_number }} in ${{ github.repository }}

            FIRST: read CLAUDE.md (especially Tech Stack & Conventions, Architecture,
            and What NOT To Do sections) and docs/PLANNING.md for the architecture spec.

            YOUR LANE (only flag these — generic defaults; project-specific rules
            below override / extend):
            - Component / package boundaries: every cross-component or cross-package
              import respects the declared public API (`exports`, barrel files,
              re-exports). Flag deep imports into another package's `dist/` or `src/`.
            - Contract compliance: every plugin / adapter / handler implements the
              interface its registry expects (lifecycle hooks, required config,
              registration shape). Flag any signature drift.
            - File organization (per CLAUDE.md): types live where the convention
              says (per-feature `types.ts`, not flat shared); handlers split per
              concern; entry points unchanged unless the diff justifies it.
            - Anti-patterns: god files, singleton-as-state, premature abstraction
              (DI frameworks, hot reload, plugin versioning), inline handlers
              instead of named, scope creep beyond the PR's stated goal.
            - Convention drift: imports follow project alias / ordering rules; no
              accidental introduction of a parallel pattern; existing primitives
              reused before new ones are added.
            - Public API stability: exported types / functions changed only with
              justification; backwards compatibility considered for protocol /
              schema changes.

            Project-specific lane rules:
            - KuzoPlugin contract: every plugin in packages/plugin-* implements the
              KuzoPlugin interface from packages/types correctly (lifecycle,
              tool registration, ResourceDefinition shape, capability model)
            - NO cross-plugin imports: plugins MUST NOT import from other plugins;
              they use callTool() via PluginContext. Any import like
              `from '@kuzo-mcp/plugin-X'` from inside another plugin is a HARD
              blocking issue.
            - Zod coverage: every MCP tool input must have a Zod schema with
              .describe() on every field; outputs should be typed
            - Monorepo boundaries: each package's package.json `dependencies` lists
              every package it imports from; no missing peer deps; `exports` map
              declares public API; no deep imports into another package's
              `dist/` or `src/`
            - File organization (per CLAUDE.md): plugin types live in
              packages/plugin-{name}/src/types.ts (NOT a shared types file);
              tool groups in tools/*.ts; plugin entry in src/index.ts;
              client in src/client.ts

            NOT YOUR LANE:
            - Security findings -> Security specialist
            - Type errors / async hygiene -> Correctness specialist
            - Formatting / naming -> ignore

            SKEPTICISM RULES:
            - Do NOT re-litigate locked architecture decisions
            - Do NOT suggest abstractions for hypothetical future requirements
            - Do NOT flag "could be more DRY" if the alternative is a premature
              abstraction. Three similar lines is BETTER than a brittle abstraction.
            - Do NOT propose "add a test" without confirming a test framework is wired
            - Do NOT re-litigate the plugin architecture — locked in docs/PLANNING.md

            STEPS:
            1. `gh pr diff ${{ needs.preflight.outputs.pr_number }}`
            2. `gh pr view ${{ needs.preflight.outputs.pr_number }} --json files`
            3. Inline-comment each finding via mcp__github_inline_comment__create_inline_comment
            4. Post ONE top-level summary via `gh pr comment` with this exact structure:

            <!-- KUZO-REVIEW-JSON-ARCHITECTURE
            {"verdict":"ship|fix-then-ship|rethink","blocking_count":N,"advisory_count":N,"sensitive_paths_touched":true|false,"top_issues":[{"file":"path","line":N,"severity":"blocking|advisory","summary":"..."}],"rationale":"..."}
            -->

            ## 🏗️ Architecture Review

            **Verdict**: <verdict>
            **Blocking**: <N> | **Advisory**: <M>

            <human-readable findings>

            ---

            sensitive_paths_touched should be `true` if the diff includes any of:
            - packages/core/src/loader/
            - packages/core/src/registry/
            - packages/types/src/
            - packages/*/package.json (exports/dependencies changes)
            - docs/PLANNING.md
          claude_args: |
            --model claude-opus-4-7
            --effort xhigh
            --max-turns 18
            --disallowedTools "Edit,Write,NotebookEdit"
            --allowedTools "Read,Glob,Grep,mcp__github_inline_comment__create_inline_comment,mcp__github_ci__get_ci_status,mcp__github_ci__get_workflow_run_details,mcp__github_ci__download_job_log,Bash(gh pr view:*),Bash(gh pr diff:*),Bash(gh pr comment:*),Bash(gh pr checks:*),Bash(gh api repos/seantokuzo/seantokuzo-mcp/pulls/*),Bash(gh api repos/seantokuzo/seantokuzo-mcp/contents/*),Bash(gh api repos/seantokuzo/seantokuzo-mcp/commits/*),Bash(gh run list:*),Bash(gh run view:*),Bash(pnpm typecheck),Bash(pnpm lint),Bash(pnpm build),Bash(pnpm test),Bash(pnpm prettier --check:*),Bash(git diff:*),Bash(git log:*),Bash(git show:*),Bash(git blame:*)"

  correctness-review:
    needs: preflight
    name: ✅ Correctness specialist
    if: |
      github.event_name != 'workflow_dispatch' ||
      inputs.specialist == 'all' ||
      inputs.specialist == 'correctness'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          additional_permissions: |
            actions: read
          prompt: |
            You are the CORRECTNESS SPECIALIST for the Kuzo MCP auto-review pipeline.

            PR: #${{ needs.preflight.outputs.pr_number }} in ${{ github.repository }}

            FIRST: read CLAUDE.md (Code Conventions + Quality Gates) and the existing
            patterns in any file you find suspect. The project's build pipeline gates
            type errors and lint errors — surface anything that would break CI as a
            blocking finding.

            YOUR LANE (only flag these — generic defaults; project-specific rules
            below override / extend):
            - TypeScript strict (or equivalent): NO `any` (must be `unknown` +
              narrowed); type-only imports (`import type { Foo }` when only used
              as a type); no non-null assertions (`!`) without a justification
              comment or framework guarantee.
            - async/await hygiene: handlers without `await` MUST NOT be `async`;
              missing `await` on Promise-returning calls; floating Promises;
              silent `.catch(() => {})` that swallow errors.
            - Null/undefined: `??` not `||` for nullish coalescing; missing
              optional chaining; non-null assertions without justification.
            - Error handling: user-facing error messages actionable; no silent
              swallows; loading/error states reachable.
            - Race conditions / shared mutable state in async event handlers,
              lifecycle hooks, or message ordering.
            - Schema correctness: any input validation library (Zod, valibot,
              etc.) schemas match actual usage; refinements where needed;
              descriptions present.
            - Convention compliance:
              * No `console.log` / `debugger` / `print(` / TODO-without-issue
                committed.
              * Imports follow project conventions (alias usage, ordering, `.js`
                suffix on relative ESM imports if required).
              * No unused exports / dead code that the diff introduces.
            - Build hygiene: project's lint / typecheck / build / test commands
              should pass. Run them locally if you suspect a regression.
            - CI / build red? Inspect via mcp__github_ci__* tools, surface the
              root cause as a blocking finding.

            Project-specific lane rules:
            - ESM `.js` suffix on every relative import path (Node ESM resolver
              requires it even for `.ts` source).
            - MCP tool error messages must be human/Claude-readable (actionable,
              not stack traces) — Claude reads these in tool output.
            - Build commands: `pnpm typecheck && pnpm lint && pnpm build` is
              the gate per CLAUDE.md Quality Gates section. Run locally if a
              regression is suspected.

            NOT YOUR LANE:
            - Security findings -> Security specialist
            - Component / package boundaries / file organization -> Architecture specialist
            - Formatting -> formatter handles it; ignore

            SKEPTICISM RULES:
            - Do NOT flag defensive code for cases the type system rules out
            - Do NOT suggest comments that explain WHAT — only WHY-when-non-obvious
            - Do NOT add error handling for scenarios that can't happen
            - Do NOT validate at internal call boundaries — only system boundaries
            - Do NOT propose backwards-compat / removed-comment artefacts. Just delete.
            - Do NOT suggest "add tests" — vitest is not wired in CI yet

            STEPS:
            1. `gh pr diff ${{ needs.preflight.outputs.pr_number }}`
            2. If CI is red, fetch the failing job logs via mcp__github_ci__download_job_log
            3. Inline-comment each finding via mcp__github_inline_comment__create_inline_comment
            4. Post ONE top-level summary via `gh pr comment` with this exact structure:

            <!-- KUZO-REVIEW-JSON-CORRECTNESS
            {"verdict":"ship|fix-then-ship|rethink","blocking_count":N,"advisory_count":N,"sensitive_paths_touched":false,"ci_failing":true|false,"top_issues":[{"file":"path","line":N,"severity":"blocking|advisory","summary":"..."}],"rationale":"..."}
            -->

            ## ✅ Correctness Review

            **Verdict**: <verdict>
            **Blocking**: <N> | **Advisory**: <M>
            **CI status**: <green | red — root cause if red>

            <human-readable findings>
          claude_args: |
            --model claude-opus-4-7
            --effort xhigh
            --max-turns 18
            --disallowedTools "Edit,Write,NotebookEdit"
            --allowedTools "Read,Glob,Grep,mcp__github_inline_comment__create_inline_comment,mcp__github_ci__get_ci_status,mcp__github_ci__get_workflow_run_details,mcp__github_ci__download_job_log,Bash(gh pr view:*),Bash(gh pr diff:*),Bash(gh pr comment:*),Bash(gh pr checks:*),Bash(gh api repos/seantokuzo/seantokuzo-mcp/pulls/*),Bash(gh api repos/seantokuzo/seantokuzo-mcp/contents/*),Bash(gh api repos/seantokuzo/seantokuzo-mcp/commits/*),Bash(gh run list:*),Bash(gh run view:*),Bash(gh run view --log:*),Bash(pnpm typecheck),Bash(pnpm lint),Bash(pnpm build),Bash(pnpm test),Bash(pnpm prettier --check:*),Bash(git diff:*),Bash(git log:*),Bash(git show:*),Bash(git blame:*)"

  verdict:
    needs: [preflight, security-review, architecture-review, correctness-review]
    name: 📋 Verdict synthesizer
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Skip on single-specialist re-reviews — synthesizer needs all 3
    # sentinels to compute the aggregate verdict; a single-specialist run
    # would mix new + stale specialist results.
    if: |
      always() && needs.preflight.result == 'success' &&
      (github.event_name != 'workflow_dispatch' || inputs.specialist == 'all')
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            You are the VERDICT SYNTHESIZER for the Kuzo MCP auto-review pipeline.

            PR: #${{ needs.preflight.outputs.pr_number }} in ${{ github.repository }}

            Specialist job results (some may have failed — handle gracefully):
            - Security: ${{ needs.security-review.result }}
            - Architecture: ${{ needs.architecture-review.result }}
            - Correctness: ${{ needs.correctness-review.result }}

            EFFICIENCY: prefer parallel tool calls in a single assistant turn.
            Multiple Bash invocations in one assistant message cost ONE turn total.
            Fetch comments once at the start — that single response gives you BOTH
            the specialist sentinels AND the existing verdict sticky id (if any).

            STEPS:

            1. Fetch PR comments (one turn):
               `gh api "repos/${{ github.repository }}/issues/${{ needs.preflight.outputs.pr_number }}/comments?per_page=100"`

            2. From step 1, extract every JSON sentinel AND the existing
               <!-- KUZO-VERDICT-STICKY --> id (if any):
               - `<!-- KUZO-REVIEW-JSON-SECURITY ... -->`
               - `<!-- KUZO-REVIEW-JSON-ARCHITECTURE ... -->`
               - `<!-- KUZO-REVIEW-JSON-CORRECTNESS ... -->`
               (Take the MOST RECENT instance of each — earlier rounds are stale.
               Use `jq` to parse: `jq '.[] | select(.body | contains("KUZO-REVIEW-JSON-SECURITY"))'`.)

            3. Compute aggregate verdict:
               - "rethink" if any specialist verdict is "rethink"
               - "fix-then-ship" if any blocking_count > 0
               - "ship" otherwise
               - total_blocking = sum of blocking_count across specialists
               - total_advisory = sum of advisory_count across specialists
               - sensitive_paths_touched = OR of all specialists' flags
               - ci_failing = correctness specialist's ci_failing (or unknown)

            4. Compute round number:
               - Find existing <!-- KUZO-VERDICT-STICKY --> comment via the step-1 fetch
               - If exists, parse `VERDICT_ROUND: N` from its body and increment to N+1
               - If not, round = 1
               - HARD CAP: if round would exceed 4, set verdict to "rethink" and add a
                 "🚨 4-round cap reached — escalating to human" line in the action plan.

            5. Compute escalation (auto-apply `claude-deep-review` label if true):
               escalate = (verdict == "rethink") OR
                          (sensitive_paths_touched AND total_blocking > 0) OR
                          (total_blocking > 5) OR
                          (PR additions+deletions > 500 — get via `gh pr view --json additions,deletions`)
               If `claude-deep-review` label already present, do not re-apply.

            6. Post or update sticky body. If existing, PATCH:
               `gh api -X PATCH "repos/${{ github.repository }}/issues/comments/<comment_id>" -f body='<NEW_BODY>'`
               If new, post:
               `gh pr comment ${{ needs.preflight.outputs.pr_number }} --body '<BODY>'`

            7. If escalating and label not present:
               `gh pr edit ${{ needs.preflight.outputs.pr_number }} --add-label claude-deep-review`
               (Create the label first if it doesn't exist:
                `gh label create claude-deep-review --color B60205 --description "Trigger deep multi-specialist review" || true`)

            STICKY BODY FORMAT (use this exactly — round number, verdict, counts substituted):

            <!-- KUZO-VERDICT-STICKY -->
            <!-- VERDICT_ROUND: N -->

            ## 📋 Auto-Review Verdict — Round N

            **Verdict**: <ship | fix-then-ship | rethink>
            **Blocking**: <N> | **Advisory**: <M>
            **CI**: <green | red — root cause>

            ### Specialists
            - 🔒 Security: <verdict> (B blocking, A advisory)
            - 🏗️ Architecture: <verdict> (B blocking, A advisory)
            - ✅ Correctness: <verdict> (B blocking, A advisory)

            ### Top action items
            - [ ] item 1 — `file:line`
            - [ ] item 2 — `file:line`
            - ... up to 5

            ---

            <IF ESCALATED>
            > 🚨 Auto-escalated to deep review — label `claude-deep-review` applied.
            > Trigger reason: <reason: rethink-verdict | sensitive-paths-with-blocking | >5-blocking | large-diff>
            </IF>

            <IF ROUND >= 4>
            > 🚨 4-round cap reached. Human decision required to merge or close.
            </IF>

            🤖 _Synthesized by Claude Opus 4.7 from Security + Architecture + Correctness specialists._
          claude_args: |
            --model claude-opus-4-7
            --effort high
            --max-turns 8
            --disallowedTools "Edit,Write,NotebookEdit"
            --allowedTools "Read,Glob,Grep,Bash(gh pr view:*),Bash(gh pr diff:*),Bash(gh pr comment:*),Bash(gh pr edit --add-label:*),Bash(gh api repos/seantokuzo/seantokuzo-mcp/issues/*),Bash(gh api repos/seantokuzo/seantokuzo-mcp/pulls/*),Bash(gh api -X PATCH repos/seantokuzo/seantokuzo-mcp/issues/comments/*),Bash(gh label create:*),Bash(gh label list:*),Bash(jq:*)"
