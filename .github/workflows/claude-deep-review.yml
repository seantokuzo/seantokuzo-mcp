name: Claude Deep Review

# Tier 3: opt-in heavy review for security-sensitive or large PRs.
# Same 3 specialists as Tier 2 BUT at --effort max + --max-turns 150,
# PLUS a 4th THREAT-MODEL specialist that does STRIDE-style deep analysis.
# Auto-fires when the Tier 2 verdict applies the `claude-deep-review` label.
# Manually fires via label add or workflow_dispatch.
#
# Tools: still READ-ONLY. The depth comes from effort + turns + an extra
# specialist, not from write access.
#
# UPSTREAM: this workflow was forked from the get-sean-done template.
# Re-sync from `../get-sean-done/.github/workflows/claude-deep-review.yml`
# and re-fill the project-specific lane rules / skepticism / trust
# boundaries below if the template gets meaningful updates.

on:
  pull_request:
    types: [labeled]
  workflow_dispatch:
    inputs:
      pr_number:
        description: PR number to deep-review
        required: true
        type: number

permissions: {}

concurrency:
  group: claude-deep-review-${{ github.event.pull_request.number || inputs.pr_number || github.ref }}
  cancel-in-progress: true

jobs:
  preflight:
    name: Preflight
    runs-on: ubuntu-latest
    if: |
      github.repository == 'seantokuzo/seantokuzo-mcp' &&
      (github.event_name == 'workflow_dispatch' ||
       (github.event_name == 'pull_request' &&
        github.event.label.name == 'claude-deep-review' &&
        github.event.pull_request.draft != true))
    outputs:
      pr_number: ${{ steps.set.outputs.pr_number }}
    steps:
      - id: set
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "pr_number=${{ inputs.pr_number }}" >> "$GITHUB_OUTPUT"
          else
            echo "pr_number=${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
          fi

  security-deep:
    needs: preflight
    name: 🔒 Security (deep)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          additional_permissions: |
            actions: read
          prompt: |
            You are the SECURITY SPECIALIST in DEEP REVIEW mode for Kuzo MCP.

            PR: #${{ needs.preflight.outputs.pr_number }} in ${{ github.repository }}

            Deep review means: take your time, read the full transitive surface, run
            the build/typecheck/test if it helps, fetch CI logs, follow imports
            across packages, and produce a thorough security review.

            FIRST: read CLAUDE.md, docs/STATE.md, docs/PLANNING.md, plus any
            project-specific security / hardening doc relevant to the touched
            surface (e.g. docs/SECURITY.md, docs/HARDENING.md).

            YOUR LANE (depth this round — generic defaults; project-specific rules
            below override / extend):
            - Auth surface: full audit of every authentication / authorization
              path touched — token issuance, refresh, revocation, storage at rest,
              accidental persistence in dotfiles / log files / fixtures, clearing
              on logout, multi-tenant / multi-user isolation
            - Trust-boundary inputs: every untrusted field reaching an external
              system, child process, or database is validated. Trace the call
              graph from boundary inward.
            - Injection surfaces: command injection (child_process.spawn / exec),
              SQL injection, path traversal, unsafe deserialization, template
              injection — full audit on every touched file
            - Secret handling: env vars, logs, error messages, fixtures, snapshot
              files, .env handling. Confirm no key material reaches stdout / stderr
              / disk outside designated stores.
            - Prompt injection: user input flowing into LLM prompts, MCP tool
              descriptions, tool inputs/outputs that another agent might
              re-execute. Trace every untrusted source -> LLM ingestion path.
            - GitHub Actions safety: pull_request_target audit, write-permission
              justification, third-party action SHA pinning, workflow_dispatch
              input validation
            - Supply chain: dependency add / upgrade scrutiny, lockfile drift,
              postinstall hooks, package-publish surface, OIDC / Trusted
              Publishing config, provenance / Sigstore attestation correctness

            Project-specific lane rules:
            - Supply chain: npm publish surface, OIDC / Trusted Publishing config drift,
              Sigstore / provenance attestation correctness on @kuzo-mcp/* packages
            - Prompt injection: especially user input flowing into github / jira /
              git-context plugin tool outputs that another agent might re-execute
            - Install CLI safety: path traversal, command injection, signature
              verification, tarball extraction safety, post-install hooks
            - PAT scope minimization for first-party plugin clients

            SKEPTICISM RULES: same as Tier 2 — no hypothetical defensive code, no
            re-litigating decisions already locked, no "add tests" without a test
            framework wired.
            - Do NOT suggest "add tests" — vitest is not wired in CI yet

            STEPS:
            1. `gh pr diff ${{ needs.preflight.outputs.pr_number }}`
            2. Inspect each touched file in full (not just the hunk)
            3. Use mcp__github_ci__* tools to inspect any failing CI logs
            4. Inline-comment findings; pushback explicitly if a finding is wrong
            5. Top-level summary with sentinel:

            <!-- KUZO-REVIEW-JSON-SECURITY
            {"verdict":"...","blocking_count":N,"advisory_count":N,"sensitive_paths_touched":bool,"top_issues":[...],"rationale":"...","tier":"deep"}
            -->

            ## 🔒 Security Review (Deep)

            **Verdict**: <verdict>
            **Blocking**: <N> | **Advisory**: <M>
            **Threat surface touched**: <description>

            <findings>
          claude_args: |
            --model claude-opus-4-7
            --effort max
            --max-turns 150
            --disallowedTools "Edit,Write,NotebookEdit"
            --allowedTools "Read,Glob,Grep,mcp__github_inline_comment__create_inline_comment,mcp__github_ci__get_ci_status,mcp__github_ci__get_workflow_run_details,mcp__github_ci__download_job_log,Bash(gh pr view:*),Bash(gh pr diff:*),Bash(gh pr comment:*),Bash(gh pr checks:*),Bash(gh api repos/seantokuzo/seantokuzo-mcp/pulls/*),Bash(gh api repos/seantokuzo/seantokuzo-mcp/contents/*),Bash(gh api repos/seantokuzo/seantokuzo-mcp/commits/*),Bash(gh run list:*),Bash(gh run view:*),Bash(gh run view --log:*),Bash(pnpm typecheck),Bash(pnpm lint),Bash(pnpm build),Bash(pnpm test),Bash(pnpm prettier --check:*),Bash(git diff:*),Bash(git log:*),Bash(git show:*),Bash(git blame:*)"

  architecture-deep:
    needs: preflight
    name: 🏗️ Architecture (deep)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          additional_permissions: |
            actions: read
          prompt: |
            You are the ARCHITECTURE SPECIALIST in DEEP REVIEW mode for Kuzo MCP.

            PR: #${{ needs.preflight.outputs.pr_number }} in ${{ github.repository }}

            Deep mode: read the full component boundary surface, every shared
            protocol type, every cross-component import site. Look for emergent
            contract drift across packages / clients / services.

            FIRST: read CLAUDE.md (Tech Stack & Conventions + What NOT To Do),
            docs/PLANNING.md, every protocol / shared-types module, and the
            parallel models on each consumer.

            YOUR LANE (depth this round — generic defaults; project-specific
            rules below override / extend):
            - Component / package boundaries: full audit of cross-component
              isolation; flag every cross-component import or leaked type
            - Adapter / plugin contracts: every implementation conforms to the
              declared interface; trace the factory, the lifecycle, the
              spawn / teardown paths; flag any direct instantiation outside
              the registry
            - Protocol compliance: every wire message matches the declared
              schema; new types mirrored on every client; UUID v4 for ids;
              ISO 8601 on the wire; backwards compatibility considered
            - File organization: per-feature types (NOT flat shared `types.ts`),
              tool / handler groups split per concern, no singletons-as-state,
              no god files
            - Anti-patterns: god files, premature abstraction (DI frameworks,
              hot reload, plugin versioning), inline handlers, scope creep —
              call them all out
            - Public API stability: every exported type / function change has
              justification; backwards compatibility considered for protocol /
              schema changes

            Project-specific lane rules:
            - KuzoPlugin contract: every plugin in packages/plugin-* implements the
              KuzoPlugin interface from packages/types correctly (lifecycle,
              tool registration, ResourceDefinition shape, capability model)
            - NO cross-plugin imports: plugins MUST NOT import from other plugins;
              they use callTool() via PluginContext
            - Zod coverage: every MCP tool input must have a Zod schema with
              .describe() on every field; outputs should be typed
            - Monorepo boundaries: each package's package.json `dependencies` lists
              every package it imports from; no missing peer deps; `exports` map
              declares public API; no deep imports into another package's
              `dist/` or `src/`
            - File organization: plugin types live in packages/plugin-{name}/src/types.ts
              (NOT a shared types file); tool groups in tools/*.ts; entry in src/index.ts;
              client in src/client.ts

            SKEPTICISM RULES: same as Tier 2.
            - Do NOT re-litigate the plugin architecture — locked in docs/PLANNING.md

            STEPS: same as Tier 2 + read every imported file's exports section.
            Sentinel:

            <!-- KUZO-REVIEW-JSON-ARCHITECTURE
            {"verdict":"...","blocking_count":N,"advisory_count":N,"sensitive_paths_touched":bool,"top_issues":[...],"rationale":"...","tier":"deep"}
            -->

            ## 🏗️ Architecture Review (Deep)

            <findings>
          claude_args: |
            --model claude-opus-4-7
            --effort max
            --max-turns 150
            --disallowedTools "Edit,Write,NotebookEdit"
            --allowedTools "Read,Glob,Grep,mcp__github_inline_comment__create_inline_comment,mcp__github_ci__get_ci_status,mcp__github_ci__get_workflow_run_details,mcp__github_ci__download_job_log,Bash(gh pr view:*),Bash(gh pr diff:*),Bash(gh pr comment:*),Bash(gh pr checks:*),Bash(gh api repos/seantokuzo/seantokuzo-mcp/pulls/*),Bash(gh api repos/seantokuzo/seantokuzo-mcp/contents/*),Bash(gh api repos/seantokuzo/seantokuzo-mcp/commits/*),Bash(gh run list:*),Bash(gh run view:*),Bash(gh run view --log:*),Bash(pnpm typecheck),Bash(pnpm lint),Bash(pnpm build),Bash(pnpm test),Bash(pnpm prettier --check:*),Bash(git diff:*),Bash(git log:*),Bash(git show:*),Bash(git blame:*)"

  correctness-deep:
    needs: preflight
    name: ✅ Correctness (deep)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          additional_permissions: |
            actions: read
          prompt: |
            You are the CORRECTNESS SPECIALIST in DEEP REVIEW mode for Kuzo MCP.

            PR: #${{ needs.preflight.outputs.pr_number }} in ${{ github.repository }}

            Deep mode: run the build / typecheck / test / lint locally (use the
            commands the project's CLAUDE.md / Quality Gates section documents),
            fetch CI logs, chase down every type assertion, every unhandled
            Promise, every `any` slip, every non-null assertion.

            FIRST: CLAUDE.md (Quality Gates + Code Conventions),
            .github/instructions/ci.instructions.md (if present).

            YOUR LANE (depth this round — generic defaults; project-specific
            rules below override / extend):
            - Run the project's full local CI commands (typecheck / lint / build /
              test). Surface every failure as a blocking finding with the exact
              error and file:line.
            - TypeScript: full `any` audit (must be `unknown`+narrow), type-only
              imports, ESM `.js` suffixes if required by the resolver
            - async/await: trace every `async` — flag `async` without `await`,
              missing `await` on Promise-returning calls, floating Promises,
              silent catches
            - Null/undefined: every `||` that could mask 0/false/empty; missing
              optional chaining; non-null assertions without justification
            - Error handling: typed errors, no silent catches; messages
              actionable on the wire; loading/error states reachable
            - Race conditions / shared mutable state in async event handlers,
              lifecycle hooks, message ordering
            - Schema correctness (Zod / valibot / etc.): schemas match actual
              usage, refinements where needed, descriptions present
            - Convention: no `console.log` / `debugger` / TODO-without-issue;
              imports follow conventions; no dead code introduced

            Project-specific lane rules:
            - ESM `.js` suffix on every relative import path (Node ESM resolver
              requires it even for `.ts` source).
            - MCP tool error messages must be human/Claude-readable (actionable,
              not stack traces) — Claude reads these in tool output.
            - Build commands: `pnpm typecheck && pnpm lint && pnpm build` is
              the gate per CLAUDE.md Quality Gates section.

            STEPS: run the full local CI; fetch failing logs via
            mcp__github_ci__*; audit the diff with build output context.
            - Do NOT suggest "add tests" — vitest is not wired in CI yet

            <!-- KUZO-REVIEW-JSON-CORRECTNESS
            {"verdict":"...","blocking_count":N,"advisory_count":N,"sensitive_paths_touched":false,"ci_failing":bool,"top_issues":[...],"rationale":"...","tier":"deep"}
            -->

            ## ✅ Correctness Review (Deep)

            <findings>
          claude_args: |
            --model claude-opus-4-7
            --effort max
            --max-turns 150
            --disallowedTools "Edit,Write,NotebookEdit"
            --allowedTools "Read,Glob,Grep,mcp__github_inline_comment__create_inline_comment,mcp__github_ci__get_ci_status,mcp__github_ci__get_workflow_run_details,mcp__github_ci__download_job_log,Bash(gh pr view:*),Bash(gh pr diff:*),Bash(gh pr comment:*),Bash(gh pr checks:*),Bash(gh api repos/seantokuzo/seantokuzo-mcp/pulls/*),Bash(gh api repos/seantokuzo/seantokuzo-mcp/contents/*),Bash(gh api repos/seantokuzo/seantokuzo-mcp/commits/*),Bash(gh run list:*),Bash(gh run view:*),Bash(gh run view --log:*),Bash(pnpm typecheck),Bash(pnpm lint),Bash(pnpm build),Bash(pnpm test),Bash(pnpm prettier --check:*),Bash(git diff:*),Bash(git log:*),Bash(git show:*),Bash(git blame:*)"

  threatmodel-deep:
    needs: preflight
    name: 🎯 Threat Model (deep)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          additional_permissions: |
            actions: read
          prompt: |
            You are the THREAT-MODEL SPECIALIST for Kuzo MCP — only runs
            in deep review.

            PR: #${{ needs.preflight.outputs.pr_number }} in ${{ github.repository }}

            FIRST: read CLAUDE.md, docs/PLANNING.md, docs/STATE.md, and any
            project-specific hardening / phase docs relevant to the touched
            surface.

            Kuzo MCP's primary trust boundaries are:
            - User shell <-> kuzo CLI / MCP server (process boundary)
            - kuzo MCP server <-> first-party plugins (in-process — host trusts plugins)
            - kuzo MCP server <-> third-party plugins (Sigstore-verified but author-untrusted; in-process today, isolated process post-issue #26)
            - Plugin <-> external API (GitHub / Jira / future services) — credentials flow through the broker (`packages/core/src/credentials.ts`)
            - Local user <-> npm registry (Trusted Publishing, OIDC-issued, no long-lived tokens)
            - kuzo CLI <-> ~/.kuzo state (consent.json, plugins/, audit.log, tuf-cache) — single-user assumption
            - LLM <-> MCP tool surface (the github / jira / git-context plugin tool outputs are LLM-readable; prompt-injection is a concern)
            # Examples (consumers: replace with your project's actual boundaries):
            # - User browser <-> API server (HTTPS)
            # - API server <-> third-party OAuth provider
            # - API server <-> database
            # - Multi-tenant isolation (per-org / per-user data scoping)

            YOUR JOB: STRIDE-style adversarial review of the changes:
            - Spoofing: identity / auth assumptions broken? token confusion?
              UA spoofing? session hijacking via WebSocket / cookies?
            - Tampering: integrity guarantees on protocol messages? config /
              cookie / localStorage tamper resistance? request signing? input
              integrity?
            - Repudiation: actions logged / attested? could an attacker cover
              tracks in the logs? could an LLM action be denied by the user
              later?
            - Information disclosure: what new data flows are introduced? could
              any cross trust boundaries unintentionally? output bleed between
              sessions / tenants? token leakage in error paths?
            - Denial of service: amplification, resource exhaustion, infinite
              loops triggered by adversarial input? fork-bomb? flood? large
              message OOM? rate-limit bypass?
            - Elevation of privilege: privilege boundaries respected? new sudo
              paths? what new capabilities does the PR grant a network attacker?
              what about a malicious tenant / user?

            FOR EACH AFFECTED COMPONENT: write out
            - Threat: <what could go wrong>
            - Attacker: <who, what capability they need>
            - Path: <how the attack works step by step>
            - Severity: <blocking / advisory>
            - Mitigation: <existing? new? recommended?>
            - Post-exploitation: <if attack succeeds, what else falls?>

            DO NOT duplicate findings the Security specialist will catch (you read
            the same files BUT focus on attacker-perspective scenarios, not
            defect-perspective findings).

            DO NOT enumerate impossible threats — be honest about likelihood.

            <!-- KUZO-REVIEW-JSON-THREATMODEL
            {"verdict":"...","blocking_count":N,"advisory_count":N,"sensitive_paths_touched":bool,"threats":[{"category":"S|T|R|I|D|E","severity":"...","summary":"..."}],"rationale":"...","tier":"deep"}
            -->

            ## 🎯 Threat Model Review (Deep)

            **Verdict**: <verdict>
            **Top threats**: <count>

            <STRIDE walkthrough by component>
          claude_args: |
            --model claude-opus-4-7
            --effort max
            --max-turns 150
            --disallowedTools "Edit,Write,NotebookEdit"
            --allowedTools "Read,Glob,Grep,mcp__github_inline_comment__create_inline_comment,mcp__github_ci__get_ci_status,mcp__github_ci__get_workflow_run_details,mcp__github_ci__download_job_log,Bash(gh pr view:*),Bash(gh pr diff:*),Bash(gh pr comment:*),Bash(gh api repos/seantokuzo/seantokuzo-mcp/pulls/*),Bash(gh api repos/seantokuzo/seantokuzo-mcp/contents/*),Bash(gh api repos/seantokuzo/seantokuzo-mcp/commits/*),Bash(gh run list:*),Bash(gh run view:*),Bash(pnpm typecheck),Bash(pnpm lint),Bash(pnpm build),Bash(pnpm test),Bash(pnpm prettier --check:*),Bash(git diff:*),Bash(git log:*),Bash(git show:*),Bash(git blame:*)"

  verdict-deep:
    needs: [preflight, security-deep, architecture-deep, correctness-deep, threatmodel-deep]
    name: 📋 Deep verdict synthesizer
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: always() && needs.preflight.result == 'success'
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            You are the DEEP VERDICT SYNTHESIZER for Kuzo MCP.

            PR: #${{ needs.preflight.outputs.pr_number }} in ${{ github.repository }}

            Specialists this round:
            - Security: ${{ needs.security-deep.result }}
            - Architecture: ${{ needs.architecture-deep.result }}
            - Correctness: ${{ needs.correctness-deep.result }}
            - Threat Model: ${{ needs.threatmodel-deep.result }}

            EFFICIENCY: prefer parallel tool calls in a single assistant turn.
            Multiple Bash invocations in one assistant message cost ONE turn total.
            Fetch comments once at the start — that single response gives you BOTH
            the specialist sentinels AND the existing deep verdict sticky id (if any).

            STEPS:

            1. Fetch PR comments (one turn):
               `gh api "repos/${{ github.repository }}/issues/${{ needs.preflight.outputs.pr_number }}/comments?per_page=100"`

            2. From step 1, extract MOST RECENT instance of each (deep-tier sentinel
               preferred where present, fall back to Tier 2 sentinel) AND the existing
               <!-- KUZO-DEEP-VERDICT-STICKY --> id (if any). Use `jq` to parse:
               - `<!-- KUZO-REVIEW-JSON-SECURITY ... -->`
               - `<!-- KUZO-REVIEW-JSON-ARCHITECTURE ... -->`
               - `<!-- KUZO-REVIEW-JSON-CORRECTNESS ... -->`
               - `<!-- KUZO-REVIEW-JSON-THREATMODEL ... -->`

            3. Aggregate:
               - verdict: rethink if any = rethink, else fix-then-ship if blocking>0, else ship
               - total_blocking, total_advisory
               - top threats list from threat model

            4. Round number: parse `DEEP_VERDICT_ROUND: N` from existing sticky and
               increment (default 1 if no sticky). HARD CAP at 4 — if exceeded, set
               verdict = rethink + escalate to human.

            5. Post or PATCH the sticky:
               - If step-2 found a comment_id: `gh api -X PATCH "repos/${{ github.repository }}/issues/comments/<id>" -f body='<BODY>'`
               - Otherwise: `gh pr comment ${{ needs.preflight.outputs.pr_number }} --body '<BODY>'`

            STICKY BODY:

            <!-- KUZO-DEEP-VERDICT-STICKY -->
            <!-- DEEP_VERDICT_ROUND: N -->

            ## 📋 Deep Review Verdict — Round N

            **Verdict**: <ship | fix-then-ship | rethink>
            **Blocking**: <N> | **Advisory**: <M>

            ### Specialists (deep mode)
            - 🔒 Security: <verdict> (B blocking, A advisory)
            - 🏗️ Architecture: <verdict> (B blocking, A advisory)
            - ✅ Correctness: <verdict> (B blocking, A advisory)
            - 🎯 Threat Model: <verdict> (B blocking, A advisory)

            ### Top action items
            - [ ] item 1 — `file:line`
            - ... up to 7

            ### Top threats (from threat model)
            - <category>: <summary>

            ---

            <IF ROUND >= 4>
            > 🚨 4-round cap reached. Human decision required to merge or close.
            </IF>

            🤖 _Synthesized by Claude Opus 4.7 (max effort) from 4 deep specialists._
          claude_args: |
            --model claude-opus-4-7
            --effort high
            --max-turns 30
            --disallowedTools "Edit,Write,NotebookEdit"
            --allowedTools "Read,Glob,Grep,Bash(gh pr view:*),Bash(gh pr comment:*),Bash(gh api repos/seantokuzo/seantokuzo-mcp/issues/*),Bash(gh api repos/seantokuzo/seantokuzo-mcp/pulls/*),Bash(gh api -X PATCH repos/seantokuzo/seantokuzo-mcp/issues/comments/*),Bash(jq:*)"
