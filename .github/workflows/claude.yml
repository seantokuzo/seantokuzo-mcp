name: Claude Mention Handler

# Tier 1: @claude interactive Q&A handler.
# Triggers on @claude mentions in issues, PRs, and review comments.
# Model: Opus 4.6 + --effort max (snappy, capable, no overthinking on Q&A).
# Tools: read-only. Write tools (Edit/Write/NotebookEdit) disallowed.
#
# UPSTREAM: this workflow was forked from the get-sean-done template.
# Re-sync from `../get-sean-done/.github/workflows/claude.yml` if the
# template gets meaningful updates.

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]
  issues:
    types: [opened, assigned, labeled]
  workflow_dispatch:
    inputs:
      issue_or_pr_number:
        description: Issue or PR number to act on
        required: true
        type: number
      prompt:
        description: Instruction for Claude
        required: true
        type: string

permissions: {}

concurrency:
  group: claude-mention-${{ github.event.issue.number || github.event.pull_request.number || github.event.inputs.issue_or_pr_number || github.ref }}
  cancel-in-progress: false

jobs:
  claude:
    name: Claude
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: |
      github.repository == 'seantokuzo/seantokuzo-mcp' &&
      (
        github.event_name == 'workflow_dispatch' ||
        (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
        (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
        (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
        (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || github.event.label.name == 'claude'))
      )
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          additional_permissions: |
            actions: read
          # workflow_dispatch path: pass an explicit prompt. For mention events,
          # let the action consume the comment body as the user message; we
          # only append standing instructions to the system prompt.
          prompt: ${{ github.event_name == 'workflow_dispatch' && inputs.prompt || '' }}
          claude_args: |
            --model claude-opus-4-6
            --effort max
            --max-turns 40
            --append-system-prompt "You are the Kuzo MCP @claude mention handler. ALWAYS read CLAUDE.md (especially the 'Reviewing with @claude' section if present) and any docs/STATE.md / docs/PLANNING.md first. Apply the standing review priorities (SECURITY -> PLUGIN CONTRACT -> CORRECTNESS -> CONVENTIONS) and the 'What NOT to flag' rules. You have READ-ONLY access — never attempt to write files, push commits, or merge. If asked to implement changes, explain what would change and recommend the user open a PR or trigger /implement separately."
            --disallowedTools "Edit,Write,NotebookEdit"
            --allowedTools "Read,Glob,Grep,mcp__github_inline_comment__create_inline_comment,mcp__github_ci__get_ci_status,mcp__github_ci__get_workflow_run_details,mcp__github_ci__download_job_log,Bash(gh pr view:*),Bash(gh pr diff:*),Bash(gh pr comment:*),Bash(gh pr checks:*),Bash(gh issue view:*),Bash(gh issue list:*),Bash(gh issue comment:*),Bash(gh api repos/seantokuzo/seantokuzo-mcp/pulls/*),Bash(gh api repos/seantokuzo/seantokuzo-mcp/issues/*),Bash(gh api repos/seantokuzo/seantokuzo-mcp/contents/*),Bash(gh api repos/seantokuzo/seantokuzo-mcp/commits/*),Bash(gh run list:*),Bash(gh run view:*),Bash(pnpm typecheck),Bash(pnpm lint),Bash(pnpm build),Bash(pnpm test),Bash(pnpm prettier --check:*),Bash(git diff:*),Bash(git log:*),Bash(git show:*),Bash(git blame:*)"
